         C 116 176, 88 182, 60 174"
      fill="none"
      stroke="url(#sl-gold)"
      stroke-width="20"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- L -->
    <path
      d="M150 40 L150 170 L220 170"
      fill="none"
      stroke="url(#sl-gold)"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>

